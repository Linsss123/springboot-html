<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Hittades inte (404)</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 2rem; }
        .card { max-width: 720px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem 1.25rem; }
        h1 { margin-top: 0; color: #111827; }
        p { color: #374151; }
        .muted { color: #6b7280; }
        a.btn { display: inline-block; background: #2563eb; color: #fff; padding: .5rem .75rem; text-decoration: none; border-radius: 4px; margin-top: .5rem; }
        a.btn:hover { background: #1d4ed8; }
    </style>
 </head>
<body>

<div class="card">
    <h1>Resursen kunde inte hittas</h1>
    <p class="muted">HTTP 404</p>
    <p th:text="${message}">Den efterfrågade resursen finns inte.</p>
    <a class="btn" th:href="@{/books}">Tillbaka till böcker</a>
 </div>

</body>
</html>
