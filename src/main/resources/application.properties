# Server config
server.port=8080

# H2 console (valfritt men hj‰lpsamt vid utveckling)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Datasource (in-memory H2)
spring.datasource.url=jdbc:h2:mem:booksdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf (standardinst‰llningar r‰cker, men explicita fˆr tydlighet)
spring.thymeleaf.cache=false
